<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Automation System</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    width:80%;
    margin:auto;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
}

button{
    background:#3498db;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

table{
    width:100%;
    border-collapse: collapse;
}

th, td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<header>
<h2>Payment Automation Dashboard</h2>
</header>

<div class="container">

<div class="card">
<h3>Schedule Automated Payment</h3>

<input type="text" id="recipient" placeholder="Recipient Name">
<input type="number" id="amount" placeholder="Amount">

<select id="frequency">
<option>Daily</option>
<option>Weekly</option>
<option>Monthly</option>
</select>

<button onclick="addPayment()">Schedule Payment</button>

</div>


<div class="card">
<h3>Scheduled Payments</h3>

<table>
<thead>
<tr>
<th>Recipient</th>
<th>Amount</th>
<th>Frequency</th>
</tr>
</thead>

<tbody id="paymentTable">

</tbody>

</table>

</div>

</div>


<script>

function addPayment(){

let recipient = document.getElementById("recipient").value
let amount = document.getElementById("amount").value
let frequency = document.getElementById("frequency").value

let table = document.getElementById("paymentTable")

let row = table.insertRow()

row.insertCell(0).innerText = recipient
row.insertCell(1).innerText = "$"+amount
row.insertCell(2).innerText = frequency

document.getElementById("recipient").value=""
document.getElementById("amount").value=""

}

</script>

</body>
</html>
